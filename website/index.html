<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CASA PIFR Companion</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">CASA Private IFR Companion</p>
        <h1>PIFR study cockpit</h1>
      </div>
      <div class="topbar-actions" aria-label="Study controls">
        <button id="prev-objective" type="button" title="Previous objective">Prev</button>
        <button id="next-objective" type="button" title="Next objective">Next</button>
      </div>
      <div class="stat-strip" aria-label="Coverage summary">
        <div><strong id="stat-objectives">93</strong><span>Objectives</span></div>
        <div><strong id="stat-mapped">0</strong><span>Mapped</span></div>
        <div><strong id="stat-partial">0</strong><span>Partial</span></div>
        <div><strong id="stat-mos">0</strong><span>MOS only</span></div>
      </div>
    </header>

    <main class="study-shell">
      <aside class="module-rail" aria-label="MOS syllabus modules">
        <div class="rail-head">
          <h2>Syllabus modules</h2>
          <button id="reset-progress" type="button">Reset</button>
        </div>
        <nav id="module-list" class="module-list"></nav>
      </aside>

      <section class="study-deck" aria-label="Study workspace">
        <div class="deck-toolbar">
          <div class="mode-tabs" role="tablist" aria-label="Study mode">
            <button type="button" class="mode-tab" data-mode="learn">Learn</button>
            <button type="button" class="mode-tab" data-mode="locate">Locate</button>
            <button type="button" class="mode-tab" data-mode="drill">Drill</button>
            <button type="button" class="mode-tab" data-mode="gaps">Gaps</button>
          </div>
          <div class="filters">
            <input id="search" type="search" placeholder="Search objective, topic, reference">
            <select id="status-filter" aria-label="Source status">
              <option value="">All statuses</option>
              <option value="Mapped">Mapped</option>
              <option value="Partial">Partial</option>
              <option value="MOS only">MOS only</option>
            </select>
          </div>
        </div>

        <section id="module-dashboard" class="module-dashboard"></section>
        <section id="objective-workspace" class="objective-workspace"></section>
      </section>

      <aside class="source-panel" aria-label="Hard copy source practice">
        <section class="panel-section">
          <h2>Hard-copy lookup drill</h2>
          <div id="lookup-card" class="lookup-card"></div>
          <div class="lookup-actions">
            <button id="lookup-random" type="button">Random</button>
            <button id="lookup-reveal" type="button">Reveal</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>Objective queue</h2>
          <div id="objective-list" class="objective-list"></div>
        </section>
      </aside>
    </main>

    <script src="app-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
